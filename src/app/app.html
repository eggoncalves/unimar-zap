<p-toolbar>
	<ng-template #start>
		<i class="pi pi-comments text-2xl"></i>
	</ng-template>

	<ng-template #end>
		<div class="flex align-items-center gap-3" *ngIf="usuarioLogado()">
			<div class="flex flex-column align-items-end usuario-info">
				<span>{{ usuarioLogado()?.nome || 'Usuário' }}</span>
				<small class="opacity-70 text-sm usuario-email">{{ usuarioLogado()?.email }}</small>
			</div>

			<p-button
				label="Logoff"
				icon="pi pi-sign-out"
				severity="secondary"
				(onClick)="logoff()"
			/>
		</div>
	</ng-template>
</p-toolbar>

<router-outlet />
