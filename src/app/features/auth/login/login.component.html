<div class="flex justify-content-center align-items-center" style="min-height: 85vh;">
    <p-card header="Entrar" styleClass="w-full md:w-4 shadow-2">
    <div class="flex flex-column gap-2">
        <label>Email</label>
        <input pInputText [(ngModel)]="model.email" />

        <label>Senha</label>
        <input pInputText type="password" [(ngModel)]="model.senha" />

        <button pButton label="Entrar" icon="pi pi-sign-in" (click)="loginEmailSenha()"></button>

        <p-divider></p-divider>

        <button pButton label="Entrar com Google" icon="pi pi-google"
                class="p-button-outlined" (click)="loginGoogle()"></button>

        <a routerLink="/cadastrar" class="mt-3">Criar conta</a>
    </div>
    </p-card>
</div>
